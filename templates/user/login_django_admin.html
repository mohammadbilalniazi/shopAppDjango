<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket Management - Login</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="/static/hostinger_login_to_heroku/all.min.css">
    <!-- Bootstrap and AdminLTE -->
    <link rel="stylesheet" href="/static/hostinger_login_to_heroku/adminlte.min.css">
    <!-- Custom fixes for django -->
    <link rel="stylesheet" href="/static/hostinger_login_to_heroku/main.css">
    <!-- Google Font: Source Sans Pro -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="/static/assets/js/axios.min.js"></script>
    <script src="/static/assets/js/cookie.js"></script>
    <script src="/static/assets/js/alert.js"></script>
    <script src="/static/assets/js/common_entities/call_shirkat.js"></script>
    <script src="/static/assets/js/user/user.js"></script>
    <div style="display:none">{% csrf_token %}</div>
    <style>
        body {
            font-family: 'Source Sans Pro', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .login-logo p {
            color: #fff;
            font-size: 1.2rem;
            margin: 0;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .card-body {
            padding: 40px;
        }
        .login-box-msg {
            text-align: center;
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .form-control {
            border-radius: 25px;
            border: 2px solid #ddd;
            padding: 15px 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .input-group-text {
            border-radius: 25px;
            border: 2px solid #ddd;
            background: #f8f9fa;
            color: #667eea;
        }
        .btn-outline-primary {
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 2px solid #667eea;
            color: #667eea;
            background: transparent;
            transition: all 0.3s ease;
        }
        .btn-outline-primary:hover {
            background: #667eea;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        #error {
            color: #dc3545;
            font-weight: bold;
            text-align: center;
            font-size: 1rem;
            margin-top: 10px;
        }
        .login-box-msg::before {
            content: "🔐";
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }
        @media (max-width: 576px) {
            .card-body {
                padding: 30px 20px;
            }
            .login-logo h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body class="jazzmin-login-page">
    <div class="login-box">
        <div class="login-logo">
            <h1><i class="fas fa-store"></i></h1>
            <p>Supermarket Electronic Management</p>
        </div>
        <div class="card">
            <div class="card-body">
                <p class="login-box-msg">Welcome Back!</p>
                <div id="error"></div>
                <div class="input-group mb-3">
                    <input type="text" name="username" id="username" class="form-control" placeholder="Username" required="">
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-user"></span>
                        </div>
                    </div>
                </div>
                <div class="input-group mb-3">
                    <input type="password" name="password" id="password" class="form-control" placeholder="Password" required="">
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-lock"></span>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button type="button" class="btn btn-outline-primary btn-block" onclick="submit_login()">
                            <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="/static/hostinger_login_to_heroku/jquery.js.download"></script>
    <!-- Bootstrap 4 -->
    <script src="/static/hostinger_login_to_heroku/bootstrap.min.js.download"></script>
    <!-- AdminLTE App -->
    <script src="/static/hostinger_login_to_heroku/adminlte.min.js.download"></script>
</body>
</html>
